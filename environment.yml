name: aabim
channels:
  - conda-forge
  - ocdb
dependencies:
  - python>=3.10
  - numpy
  - scipy
  - xarray
  - zarr
  - dask
  - netCDF4
  - h5py
  - pandas
  - geopandas
  - shapely
  - rasterio
  - pyproj
  - affine
  - pooch
  - tqdm
  - statsmodels
  - timezonefinder
  - pendulum
  - charset-normalizer
  - matplotlib
  - gdal
  - ipykernel
  - black
  # Optional — GPU-accelerated backend (requires an NVIDIA GPU and CUDA drivers).
  # Remove this line if you do not have a GPU.
  - cupy
  - pip
  - pip:
    # Type-II (SMA/OLS/Ratio) calibration model — not yet on conda-forge.
    - pylr2
